name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install sqlite3
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Run tests
        run: make test

      - name: Run vet
        run: go vet ./...

      - name: Build
        run: make build
